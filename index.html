<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尚舞教务系统</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.1);
      max-width: 340px;
      width: 90%;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #16a34a, #4ade80);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 16px;
    }
    h1 { color: #111827; font-size: 22px; margin-bottom: 6px; }
    p { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #16a34a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { color: #16a34a; font-size: 14px; font-weight: 600; }
    .note { color: #9ca3af; font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🩰</div>
    <h1>尚舞教务系统</h1>
    <p>正在连接，请稍候…</p>
    <div class="spinner"></div>
    <div class="status" id="status">正在跳转</div>
    <div class="note" id="note">如长时间无法访问，请联系管理员</div>
  </div>
  <script>
    // 读取当前跳转地址并跳转
    fetch('url.txt?t=' + Date.now())
      .then(r => r.text())
      .then(url => {
        url = url.trim();
        if (url && url.startsWith('http')) {
          document.getElementById('status').textContent = '连接成功，正在跳转…';
          setTimeout(() => { window.location.href = url; }, 800);
        } else {
          document.getElementById('status').textContent = '⚠️ 系统暂时离线';
          document.getElementById('note').textContent = '管理员电脑可能未开机，请稍后再试';
        }
      })
      .catch(() => {
        document.getElementById('status').textContent = '⚠️ 系统暂时离线';
        document.getElementById('note').textContent = '管理员电脑可能未开机，请稍后再试';
      });
  </script>
</body>
</html>
